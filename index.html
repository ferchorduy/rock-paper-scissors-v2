<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock, Paper, Scissors</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="intro">
    <input type="text" id="name-input" class="intro__input" placeholder="enter name" autocomplete="off" spellcheck="false" maxlength="10">
    <button id="play-button" class="intro__button">PLAY</button>
  </div>
  <div class="game hidden">
    <div class="game__global">
      <p class="game__user-name"></p>
      <div class="game__global-score-container">
        <p class="game__global-left-bracket">(</p>
        <p class="game__user-global">0</p>
        <span class="game__global-divider">-</span>
        <p class="game__clanker-global">0</p>
        <p class="game__global-right-bracket">)</p>
      </div>
      <p class="game__clanker-name">clanker</p>
    </div>
    <div class="game__round-info">
      <p class="game__user-choice"></p>
      <p class="game__user-score">0</p>
      <span class="game__score-divider">:</span>
      <p class="game__clanker-score">0</p>
      <p class="game__clanker-choice"></p>
    </div>
    <div class="game__choices">
      <button id="rock" class="game__choice">{R}</button>
      <button id="paper" class="game__choice">[P]</button>
      <button id="scissors" class="game__choice">\S/</button>
    </div>
    <div class="game__footer">
      <p class="game__message">beat the clanker!</p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
